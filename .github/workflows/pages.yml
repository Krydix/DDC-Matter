name: Build Firmware And Deploy Installer

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build-pages:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install host prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build

      - name: Install compatible CMake
        run: python -m pip install --user --upgrade "cmake<4"

      - name: Bootstrap dependencies
        run: make dev-init

      - name: Build firmware
        run: make build

      - name: Stage GitHub Pages web installer
        run: make web-installer

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web-installer

  deploy-pages:
    needs: build-pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4